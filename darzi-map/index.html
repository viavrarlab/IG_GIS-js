<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1.0,user-scalable=no">
  <style>
    @import "https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css";
    @import "https://cdn.jsdelivr.net/npm/@watergis/maplibre-gl-terradraw/dist/maplibre-gl-terradraw.css";

    body,
    div {
      margin: 0;
      padding: 0;
    }

    html,
    body,
    #main,
    #map {
      height: 100%;
    }

    #coords {
      display: block;
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translate(-50%);
      padding: 5px;
      font-size: 12px;
      text-align: center;
      color: #000;
      background: #fff;
    }

    #exaggeration {
      display: block;
      position: absolute;
      bottom: 65px;
      left: 15px;
      padding: 5px;
      font-size: 12px;
    }

    #limit {
      display: block;
      position: absolute;
      bottom: 40px;
      left: 15px;
      padding: 5px;
      font-size: 12px;
    }

    #layers {
      display: block;
      position: absolute;
      bottom: 15px;
      left: 15px;
      padding: 5px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div id="main">
    <div id="map"></div>
    <pre id="coords"></pre>
    <input id="exaggeration" type="range" min="0.5" max="10" step="0.1" value="1">
    <input id="limit" type="range" min="0" max="250000" step="1000" value="250000">
    <select id="layers">
      <option value="osm">OSM</option>
      <option value="mapzen">Mapzen</option>
      <option value="contour">Contour</option>
    </select>
  </div>
  <script type="module">
    import "./src/index.js";
  </script>
</body>

</html>
