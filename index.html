<!DOCTYPE html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1.0,user-scalable=no"><link rel=stylesheet href=https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css><link rel=stylesheet href=https://cdn.jsdelivr.net/npm/@watergis/maplibre-gl-terradraw/dist/maplibre-gl-terradraw.css><style>body,div{margin:0;padding:0}html,body,#main,#map{height:100%}#container{background-color:#fff;width:90%;height:40%;display:none;position:absolute;bottom:5%;left:10%;overflow:hidden}#log{word-break:break-all;overflow-wrap:anywhere;height:100%;font-size:12px;overflow-y:scroll}#coords{text-align:center;color:#000;background:#fff;padding:5px;font-size:12px;display:block;position:absolute;bottom:5px;left:50%;transform:translate(-50%)}#exaggeration{padding:5px;font-size:12px;display:block;position:absolute;bottom:65px;left:15px}#limit{padding:5px;font-size:12px;display:block;position:absolute;bottom:40px;left:15px}#layers{padding:5px;font-size:12px;display:block;position:absolute;bottom:15px;left:15px}</style><script type=module src=darzi-map.10d34fe3.js></script><body>
  <div id=main>

    <div id=container>
      <div id=log></div>

    <input id=limit type=range min=0 max=250000 step=1000 value=250000>

      <option value=contour>Contour</option>
    </select>
  </div>
